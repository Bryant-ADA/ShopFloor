<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADA Enterprises - Shop Floor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100vw;height:100vh;overflow:hidden;background:#0b0b10;font-family:'Courier New',monospace}
.root{width:100vw;height:100vh;display:flex;flex-direction:column;padding:8px;gap:5px}
.topbar{display:flex;align-items:center;background:#111118;border:1px solid #222232;border-radius:5px;padding:6px 14px;flex-shrink:0}
.logo{font-size:clamp(12px,1.3vw,18px);font-weight:bold;color:#e8c840;letter-spacing:3px;padding-right:14px}
.tsep{width:1px;height:26px;background:#2a2a3a;margin:0 14px}
.clk{font-size:clamp(18px,2vw,28px);font-weight:bold;color:#fff;letter-spacing:4px;font-variant-numeric:tabular-nums}
.live{display:flex;align-items:center;gap:7px}
.dot{width:8px;height:8px;border-radius:50%;background:#1D9E75;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.ltxt{font-size:clamp(8px,0.8vw,12px);color:#555;letter-spacing:1px}
.sp{flex:1}
.stat{text-align:center;padding:0 14px;border-left:1px solid #1e1e2e}
.sn{font-size:clamp(16px,1.8vw,26px);font-weight:bold;line-height:1;color:#fff}
.sn.red{color:#ff4040}.sn.amber{color:#E24B4A}
.sl{font-size:clamp(6px,0.65vw,9px);color:#444;letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.upd{font-size:clamp(7px,0.65vw,9px);color:#333;margin-left:12px;white-space:nowrap}
.leg{display:flex;align-items:center;gap:14px;padding:0 2px}
.li{display:flex;align-items:center;gap:4px;font-size:clamp(8px,0.75vw,11px);color:#444}
.ld{width:9px;height:9px}.lwo{width:9px;height:9px;border:1px solid #5dca9e}
.note{font-size:clamp(7px,0.68vw,10px);color:#252535;margin-left:auto;font-style:italic}
.board{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));grid-template-rows:repeat(2,1fr);gap:5px;flex:1;min-height:0}
.col{background:#111118;border:1px solid #1a1a28;border-radius:4px;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.accent{height:3px}
.chdr{display:flex;align-items:center;justify-content:space-between;padding:4px 9px;border-bottom:1px solid #161622}
.cname{font-size:clamp(7px,0.78vw,11px);font-weight:bold;letter-spacing:.7px;text-transform:uppercase;color:#bbb;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:64%}
.cmeta{display:flex;align-items:center;gap:4px}
.ctot{font-size:clamp(7px,0.72vw,10px);color:#444;background:#0b0b10;padding:1px 5px;border-radius:2px;font-weight:bold}
.clc{font-size:clamp(7px,0.72vw,10px);color:#ff4040;font-weight:bold}
.cwo{font-size:clamp(7px,0.72vw,10px);color:#5dca9e;font-weight:bold}
.cjobs{flex:1;padding:3px;display:flex;flex-direction:column;gap:2px;overflow:hidden;min-height:0}
.jrow{display:flex;align-items:center;padding:3px 7px;border-left:3px solid #2a2a3a;background:#0f0f18;border-radius:2px;gap:4px}
.jrow.hi{border-left-color:#E24B4A;background:#1a0d0d}
.jrow.mo{border-left-color:#c9a830;background:#111118}
.jrow.wo{border-left-color:#5dca9e;background:#0a1210}
.jrow.late{outline:1px solid rgba(255,64,64,.28)}
.jnum{font-size:clamp(11px,1.15vw,16px);font-weight:bold;color:#fff;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.jdue{font-size:clamp(9px,0.85vw,12px);font-weight:bold;color:#555;white-space:nowrap}
.jdue.late{color:#ff5050}
.jindic{width:5px;height:5px;border-radius:50%}
.jindic.hi{background:#E24B4A}.jindic.mo{background:#c9a830}.jindic.wo{background:#5dca9e}
.late-dot{width:5px;height:5px;border-radius:50%;background:#ff4040}
.cmore{text-align:center;font-size:clamp(7px,0.68vw,10px);color:#252535;padding:2px 0;cursor:pointer;border-top:1px solid #141420}
.cmore:hover{color:#e8c840}
.cempty{font-size:clamp(9px,0.85vw,12px);color:#1e1e28;text-align:center;flex:1;display:flex;align-items:center;justify-content:center}
</style></head><body>
<div class="root">

  <div class="board" id="board"></div>
</div>
