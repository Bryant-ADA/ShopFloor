<title>ADA Enterprises — Shop Floor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100vw;height:100vh;overflow:hidden;background:#0b0b10;font-family:'Courier New',Courier,monospace}
.root{width:100vw;height:100vh;display:flex;flex-direction:column;padding:8px;gap:5px}
.topbar{display:flex;align-items:center;background:#111118;border:1px solid #222232;border-radius:5px;padding:6px 14px;flex-shrink:0;gap:0}
.logo{font-size:clamp(12px,1.3vw,18px);font-weight:bold;color:#e8c840;letter-spacing:3px;padding-right:14px}
.tsep{width:1px;height:26px;background:#2a2a3a;flex-shrink:0;margin:0 14px}
.clk{font-size:clamp(18px,2vw,28px);font-weight:bold;color:#fff;letter-spacing:4px;font-variant-numeric:tabular-nums;flex-shrink:0}
.live{display:flex;align-items:center;gap:7px;flex-shrink:0}
.dot{width:8px;height:8px;border-radius:50%;background:#1D9E75;flex-shrink:0;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.ltxt{font-size:clamp(8px,0.8vw,12px);color:#555;letter-spacing:1px}
.sp{flex:1}
.stat{text-align:center;padding:0 14px;border-left:1px solid #1e1e2e}
.sn{font-size:clamp(16px,1.8vw,26px);font-weight:bold;line-height:1;color:#fff}
.sn.red{color:#ff4040}.sn.amber{color:#E24B4A}
.sl{font-size:clamp(6px,0.65vw,9px);color:#444;letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.upd{font-size:clamp(7px,0.65vw,9px);color:#333;margin-left:12px;white-space:nowrap;flex-shrink:0}
.leg{display:flex;align-items:center;gap:14px;flex-shrink:0;padding:0 2px}
.li{display:flex;align-items:center;gap:4px;font-size:clamp(8px,0.75vw,11px);color:#444}
.ld{width:9px;height:9px;border-radius:0}
.lwo{width:9px;height:9px;border-radius:0;border:1px solid #5dca9e}
.note{font-size:clamp(7px,0.68vw,10px);color:#252535;margin-left:auto;font-style:italic}
.board{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));grid-template-rows:repeat(2,1fr);gap:5px;flex:1;min-height:0}
.col{background:#111118;border:1px solid #1a1a28;border-radius:4px;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.accent{height:3px;flex-shrink:0}
.chdr{display:flex;align-items:center;justify-content:space-between;padding:4px 9px;border-bottom:1px solid #161622;flex-shrink:0}
.cname{font-size:clamp(7px,0.78vw,11px);font-weight:bold;letter-spacing:.7px;text-transform:uppercase;color:#bbb;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:68%}
.cmeta{display:flex;align-items:center;gap:4px;flex-shrink:0}
.ctot{font-size:clamp(7px,0.72vw,10px);color:#444;background:#0b0b10;padding:1px 5px;border-radius:2px;font-weight:bold}
.clc{font-size:clamp(7px,0.72vw,10px);color:#ff4040;font-weight:bold}
.cwo{font-size:clamp(7px,0.72vw,10px);color:#5dca9e;font-weight:bold}
.cjobs{flex:1;padding:3px;display:flex;flex-direction:column;gap:2px;overflow:hidden;min-height:0}
.jrow{display:flex;align-items:center;padding:4px 8px;border-left:3px solid #2a2a3a;background:#0f0f18;border-radius:2px;flex-shrink:0;gap:5px}
.jrow.hi{border-left-color:#E24B4A;background:#1a0d0d}
.jrow.mo{border-left-color:#c9a830;background:#111118}
.jrow.wo{border-left-color:#5dca9e;background:#0a1210}
.jrow.late{outline:1px solid rgba(255,64,64,.28)}
.jrow.hi.late{background:#1e0909}
.jrow.wo.late{outline-color:rgba(93,202,158,.25)}
.jnum{font-size:clamp(12px,1.2vw,17px);font-weight:bold;color:#FFFFFF;letter-spacing:.4px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.jright{display:flex;align-items:center;gap:4px;flex-shrink:0}
.bg{font-size:clamp(6px,0.6vw,8px);padding:1px 4px;border-radius:2px;font-weight:bold;letter-spacing:.4px;white-space:nowrap}
.bhi{background:rgba(226,75,74,.15);color:#ff7070;border:1px solid rgba(226,75,74,.4)}
.bmo{background:rgba(201,168,48,.12);color:#c9a830;border:1px solid rgba(201,168,48,.3)}
.blate{background:rgba(255,64,64,.12);color:#ff7070;border:1px solid rgba(255,64,64,.3)}
.bwo{background:rgba(93,202,158,.12);color:#5dca9e;border:1px solid rgba(93,202,158,.3)}
.jdue{font-size:clamp(9px,0.9vw,13px);font-weight:bold;color:#555;white-space:nowrap}
.jdue.late{color:#ff5050}
.jasgn{font-size:clamp(6px,0.62vw,9px);color:#2e2e3e;border:1px solid #1e1e2e;background:transparent;padding:1px 5px;border-radius:2px;cursor:pointer;font-family:inherit;white-space:nowrap}
.jasgn:hover{color:#e8c840;border-color:#e8c840}
.jasgn.on{color:#5dca9e;border-color:rgba(93,202,158,.4)}
.cmore{text-align:center;font-size:clamp(7px,0.68vw,10px);color:#252535;padding:2px 0;cursor:pointer;border-top:1px solid #141420;flex-shrink:0}
.cmore:hover{color:#e8c840}
.cempty{font-size:clamp(9px,0.85vw,12px);color:#1e1e28;text-align:center;flex:1;display:flex;align-items:center;justify-content:center}
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;align-items:center;justify-content:center}
.mbg.open{display:flex}
.mbox{background:#14141f;border:1px solid #2a2a40;border-radius:8px;padding:18px;min-width:230px}
.mttl{font-size:10px;color:#e8c840;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px}
.msub{font-size:10px;color:#555;margin-bottom:10px}
.eb{display:block;width:100%;font-size:13px;color:#aaa;border:1px solid #1e1e2e;background:#0b0b10;padding:8px 10px;border-radius:4px;cursor:pointer;font-family:inherit;text-align:left;margin-bottom:3px}
.eb:hover{border-color:#e8c840;color:#e8c840}
.eb.on{border-color:rgba(29,158,117,.4);color:#5dca9e;background:rgba(29,158,117,.08)}
.mcan{width:100%;margin-top:5px;font-size:9px;color:#333;border:1px solid #1a1a28;background:transparent;padding:5px;border-radius:3px;cursor:pointer;font-family:inherit}
</style>

const EMPS=['Jesse Halfpop','Trevor Johnson','Riley','Jennifer W.','Dan Fank','Jo Raffaele','Other'];
const PORD={High:0,Moderate:1,Low:2};
const PAGE=10;
const WCS=[
  {n:'Welding',c:'#7a1a1a'},{n:'Weld Ag/RACS',c:'#1a5a28'},
  {n:'Brake & Bend',c:'#1a2a6b'},{n:'Cut Bar & Chop Saw',c:'#3a1a6b'},
  {n:'Hot For Coating',c:'#7a4a0a'},{n:'Punch, Nip & Roll',c:'#6b1a4a'},
  {n:'Turret',c:'#2a2a3a'},{n:'Shear',c:'#0e4a4a'},
  {n:'Tube Laser',c:'#1a2a6b'},{n:'Sheet Laser',c:'#0e5a2a'},
  {n:'Wire & Spot Weld',c:'#5a4a0a'},{n:'Shipping',c:'#1a5a1a'},
];

function srt(a){return[...a].sort((x,y)=>{
  const wx=(x.wo?1:0),wy=(y.wo?1:0);if(wx!==wy)return wx-wy;
  const lx=(x.l?0:1),ly=(y.l?0:1);if(lx!==ly)return lx-ly;
  const px=(PORD[x.p]??1),py=(PORD[y.p]??1);if(px!==py)return px-py;
  return(x.d||'').localeCompare(y.d||'');
});}
function fD(d){if(!d)return'';const t=new Date(d);return(t.getMonth()+1)+'/'+t.getDate();}

const SORTED={},shown={};
WCS.forEach(({n})=>{SORTED[n]=srt(RAW[n]||[]);shown[n]=PAGE;});
document.getElementById('s-late').textContent=STATS.late;
document.getElementById('s-total').textContent=STATS.total;
document.getElementById('s-hi').textContent=STATS.hi;
document.getElementById('upd').textContent='Data: '+DATA_UPDATED;

let assigns={},curJob=null;
function pCls(j){return j.wo?'wo':(j.p==='High'?'hi':'mo');}
function pBadge(j){
  if(j.wo)return'<span class="bg bwo">WO</span>';
  if(j.p==='High')return'<span class="bg bhi">HIGH</span>';
  return'<span class="bg bmo">MOD</span>';
}
function render(){
  document.getElementById('board').innerHTML=WCS.map(({n,c})=>{
    const all=SORTED[n],tot=all.length;
    const lc=all.filter(j=>j.l).length,wc=all.filter(j=>j.wo).length;
    const lim=Math.min(shown[n],tot),vis=all.slice(0,lim),rem=tot-lim;
    const rows=tot===0?'<div class="cempty">No active jobs</div>':vis.map(j=>{
      const a=assigns[j.n],safe=j.n.replace(/'/g,"\\'");
      return`<div class="jrow ${pCls(j)} ${j.l?'late':''}">
        <span class="jnum">${j.n}</span>
        <span class="jright">
          ${j.l?'<span class="bg blate">LATE</span>':''}
          ${pBadge(j)}
          <span class="jdue ${j.l?'late':''}">${fD(j.d)}</span>
          <button class="jasgn ${a?'on':''}" onclick="openM('${safe}')">${a?a.split(' ')[0]:'+'}</button>
        </span>
      </div>`;
    }).join('');
    const more=rem>0?`<div class="cmore" onclick="showMore('${n}')">&#9662; ${rem} more</div>`:(lim>PAGE?`<div class="cmore" onclick="showLess('${n}')">&#9652; less</div>`:'');
    const lb=lc>0?`<span class="clc">${lc}&#9888;</span>`:'';
    const wb=wc>0?`<span class="cwo">${wc}WO</span>`:'';
    return`<div class="col">
      <div class="accent" style="background:${c}"></div>
      <div class="chdr"><span class="cname">${n}</span><span class="cmeta"><span class="ctot">${tot}</span>${wb}${lb}</span></div>
      <div class="cjobs">${rows}</div>${more}
    </div>`;
  }).join('');
}
function showMore(n){shown[n]+=PAGE;render();}
function showLess(n){shown[n]=PAGE;render();}
function openM(name){
  curJob=name;
  document.getElementById('msub').textContent=(name.startsWith('WO-')?'Work Order ':'Job ')+name;
  const cur=assigns[name];
  document.getElementById('elist').innerHTML=[...EMPS,'— Unassign'].map(e=>
    `<button class="eb ${cur===e?'on':''}" onclick="pickE('${e}')">${e}${cur===e?' ✓':''}</button>`
  ).join('');
  document.getElementById('modal').classList.add('open');
}
function pickE(e){if(curJob){if(e==='— Unassign')delete assigns[curJob];else assigns[curJob]=e;}closeM();render();}
function closeM(){document.getElementById('modal').classList.remove('open');curJob=null;}
setInterval(()=>{document.getElementById('clk').textContent=new Date().toLocaleTimeString('en-US',{hour12:false});},1000);
document.getElementById('clk').textContent=new Date().toLocaleTimeString('en-US',{hour12:false});
render();
