name: Update Shop Floor Dashboard

on:
  schedule:
    - cron: '0 * * * *'   # Every hour on the hour
  workflow_dispatch:        # Also allows manual trigger from GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run update script
        run: python update_dashboard.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update dashboard $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
